<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网页设计报价计算器 | 在线免费估价</title>
<style>
:root{--bg:#050510;--card:rgba(15,15,35,0.55);--border:rgba(255,255,255,0.05);--text:#e8e8f5;--muted:#7e7ea0;--accent:#7c5ce7;--accent2:#b094f8;--radius:18px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden;cursor:none}
body .cursor{width:8px;height:8px;background:#fff;border-radius:50%;position:fixed;pointer-events:none;z-index:9999;mix-blend-mode:difference;transition:transform .1s}
body .cursor-follower{width:40px;height:40px;border:1px solid rgba(167,139,250,.3);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transition:transform .3s ease-out,width .3s,height .3s,border-color .3s}
.container{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:24px}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

/* Floating orbs */
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.3;pointer-events:none;z-index:0}
.orb-1{width:400px;height:400px;background:radial-gradient(circle,#7c5ce7,transparent);top:-100px;left:10%;animation:float1 12s ease-in-out infinite}
.orb-2{width:300px;height:300px;background:radial-gradient(circle,#a78bfa,transparent);bottom:-80px;right:5%;animation:float2 15s ease-in-out infinite}
.orb-3{width:250px;height:250px;background:radial-gradient(circle,#6366f1,transparent);top:50%;left:60%;animation:float3 18s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.2)}66%{transform:translate(-30px,30px) scale(.85)}}
@keyframes float2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-50px,-30px) scale(1.15)}66%{transform:translate(40px,20px) scale(.9)}}
@keyframes float3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,-50px) scale(1.25)}}

/* Header */
header{text-align:center;padding:60px 0 44px;position:relative}
header .ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border:1px solid rgba(124,92,231,.15);border-radius:50%;animation:spin 20s linear infinite}
header .ring:nth-child(2){width:160px;height:160px;border-color:rgba(167,139,250,.08);animation-duration:25s;animation-direction:reverse}
header .ring:nth-child(3){width:200px;height:200px;border-color:rgba(124,92,231,.05);animation-duration:30s}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
header .badge{display:inline-block;padding:7px 18px;background:rgba(124,92,231,.1);border:1px solid rgba(124,92,231,.25);border-radius:24px;font-size:.78rem;color:var(--accent2);margin-bottom:22px;letter-spacing:2px;position:relative;z-index:1}
header h1{font-size:2.4rem;font-weight:900;letter-spacing:-1.5px;background:linear-gradient(135deg,#e8e8f5 0%,#b094f8 30%,#7c5ce7 60%,#6366f1 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;position:relative;z-index:1;line-height:1.3}
header p{color:var(--muted);font-size:.9rem;position:relative;z-index:1}

/* Card */
.card{background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--radius);padding:30px;margin-bottom:18px;position:relative;overflow:hidden;transition:border-color .4s,box-shadow .4s}
.card:hover{border-color:rgba(124,92,231,.15);box-shadow:0 4px 30px rgba(124,92,231,.06)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,92,231,.4),transparent)}
.card h2{font-size:1rem;margin-bottom:22px;display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:.5px}
.card h2 .icon{font-size:1.2rem;opacity:.9}

/* Options */
.options{display:flex;flex-wrap:wrap;gap:10px}
.option{flex:1;min-width:100px;padding:18px 12px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.05);border-radius:14px;cursor:pointer;text-align:center;transition:all .35s cubic-bezier(.4,0,.2,1)}
.option:hover{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03);transform:translateY(-3px)}
.option.selected{background:rgba(124,92,231,.1);border-color:var(--accent);box-shadow:0 0 28px rgba(124,92,231,.2),0 0 0 4px rgba(124,92,231,.05)}
.option .name{font-size:.9rem;font-weight:600;margin-bottom:5px}
.option .hint{font-size:.7rem;color:var(--muted)}

/* Check rows */
.check-group{display:flex;flex-direction:column;gap:8px}
.check-row{display:flex;align-items:center;gap:14px;padding:15px 18px;background:rgba(255,255,255,.01);border:1px solid rgba(255,255,255,.03);border-radius:14px;cursor:pointer;transition:all .25s}
.check-row:hover{background:rgba(124,92,231,.04);border-color:rgba(124,92,231,.15)}
.check-row:has(input:checked){background:rgba(124,92,231,.06);border-color:rgba(124,92,231,.2)}
.check-row input[type=checkbox]{appearance:none;width:21px;height:21px;border:2px solid rgba(255,255,255,.12);border-radius:7px;cursor:pointer;position:relative;flex-shrink:0;transition:all .25s}
.check-row input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent);box-shadow:0 0 16px rgba(124,92,231,.4)}
.check-row input[type=checkbox]:checked::after{content:"✓";color:#fff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:800}
.check-label{font-size:.88rem;font-weight:500}
.check-price{font-size:.82rem;color:var(--accent2);margin-left:auto;font-weight:700;min-width:60px;text-align:right}

/* Result Ring */
.result{text-align:center;padding:50px 0 44px;position:relative}
.result-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:220px;height:220px;border-radius:50%;border:2px solid transparent;border-top-color:rgba(124,92,231,.25);border-right-color:rgba(167,139,250,.15);animation:resultSpin 8s linear infinite;pointer-events:none}
.result-ring:nth-child(2){width:260px;height:260px;border-top-color:rgba(167,139,250,.12);border-left-color:rgba(124,92,231,.08);border-right-color:transparent;animation-duration:14s;animation-direction:reverse}
@keyframes resultSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.result .label{font-size:.75rem;text-transform:uppercase;letter-spacing:4px;color:var(--muted);margin-bottom:14px;position:relative;z-index:1}
.result .total{font-size:4.2rem;font-weight:950;letter-spacing:-4px;line-height:1;position:relative;z-index:1;background:linear-gradient(180deg,#fff 0%,#b094f8 50%,#7c5ce7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;transition:all .3s;filter:drop-shadow(0 0 30px rgba(124,92,231,.3))}
.result .range{font-size:1rem;color:var(--muted);margin-top:10px;position:relative;z-index:1;font-weight:500}
.result .includes{color:var(--muted);font-size:.8rem;margin-top:18px;padding:8px 22px;background:rgba(255,255,255,.02);border-radius:24px;display:inline-block;position:relative;z-index:1;border:1px solid rgba(255,255,255,.04)}

/* CTA */
.cta-wrap{position:relative;margin-top:8px}
.cta{display:block;width:100%;padding:20px;background:linear-gradient(135deg,#6d4fd8 0%,#7c5ce7 40%,#a78bfa 100%);color:#fff;border:none;border-radius:16px;font-size:1.02rem;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;transition:all .35s;position:relative;overflow:hidden;letter-spacing:.5px;z-index:1}
.cta::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#a78bfa,#7c5ce7,#6d4fd8);opacity:0;transition:opacity .4s}
.cta:hover::after{opacity:1}
.cta:hover{box-shadow:0 12px 40px rgba(124,92,231,.45);transform:translateY(-3px)}
.cta span{position:relative;z-index:1}
.cta-glow{position:absolute;inset:-3px;border-radius:19px;background:linear-gradient(135deg,#7c5ce7,#a78bfa,#7c5ce7);filter:blur(20px);opacity:.25;transition:opacity .4s;pointer-events:none;z-index:0}
.cta-wrap:hover .cta-glow{opacity:.5}

/* Footer */
footer{text-align:center;color:var(--muted);font-size:.76rem;padding:36px 0 60px;position:relative;z-index:1}
footer a{color:var(--accent2);text-decoration:none;font-weight:500}
footer a:hover{text-decoration:underline}

@media(max-width:480px){
header h1{font-size:1.7rem}
.option{min-width:80px;padding:14px 8px}
.option .name{font-size:.82rem}
.result .total{font-size:3rem}
.result-ring,.result-ring:nth-child(2){width:160px;height:160px}
.cursor,.cursor-follower{display:none}
body{cursor:auto}
}
</style>
</head>
<body>

<!-- Floating orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Particle canvas -->
<canvas id="particles"></canvas>

<!-- Custom cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursorFollower"></div>

<div class="container">
<header>
<div class="ring"></div><div class="ring"></div><div class="ring"></div>
<div class="badge">DESIGN PRICING TOOL</div>
<h1>网页设计报价计算器</h1>
<p>自由搭配需求 · 即刻生成报价 · 设计师 <b>秋野春日</b></p>
</header>

<div class="card">
<h2><span class="icon">📋</span> 网站类型</h2>
<div class="options" id="typeOptions">
<div class="option selected" data-type="landing" data-base="500">
<div class="name">单页落地页</div><div class="hint">产品推广 / 个人介绍</div></div>
<div class="option" data-type="business" data-base="1500">
<div class="name">企业官网</div><div class="hint">多页面 / 品牌展示</div></div>
<div class="option" data-type="ecommerce" data-base="2800">
<div class="name">电商店铺</div><div class="hint">产品展示 / 购物流程</div></div>
</div>
</div>

<div class="card">
<h2><span class="icon">📄</span> 页面数量</h2>
<div class="options" id="pageOptions">
<div class="option selected" data-pages="1" data-add="0"><div class="name">1页</div><div class="hint">单页滚动</div></div>
<div class="option" data-pages="3" data-add="300"><div class="name">3页</div><div class="hint">小站标配</div></div>
<div class="option" data-pages="5" data-add="600"><div class="name">5页</div><div class="hint">常见规格</div></div>
<div class="option" data-pages="10" data-add="1500"><div class="name">10页+</div><div class="hint">内容较多</div></div>
</div>
</div>

<div class="card">
<h2><span class="icon">⚡</span> 附加功能</h2>
<div class="check-group" id="featureChecks">
<label class="check-row">
<input type="checkbox" data-add="300"><span class="check-label">📱 移动端适配</span><span class="check-price">+¥300</span></label>
<label class="check-row">
<input type="checkbox" data-add="200"><span class="check-label">📧 联系表单</span><span class="check-price">+¥200</span></label>
<label class="check-row">
<input type="checkbox" data-add="300"><span class="check-label">🔍 SEO 优化</span><span class="check-price">+¥300</span></label>
<label class="check-row">
<input type="checkbox" data-add="800"><span class="check-label">🔗 后台管理系统</span><span class="check-price">+¥800</span></label>
<label class="check-row">
<input type="checkbox" data-add="200"><span class="check-label">🚀 上线部署协助</span><span class="check-price">+¥200</span></label>
</div>
</div>

<div class="result">
<div class="result-ring"></div><div class="result-ring"></div>
<div class="label">预 估 报 价</div>
<div class="total" id="totalPrice">¥500</div>
<div class="range" id="rangeText">实际 ¥425 ~ ¥575</div>
<div class="includes">设计 + 开发 + 修改 · 无隐藏费用</div>
</div>

<div class="cta-wrap">
<a class="cta" id="ctaBtn" href="https://m.tb.cn/h.R4Fav0N?tk=KhKo5w3corA" target="_blank"><span>去闲鱼联系「秋野春日」· 获取详细报价</span></a>
<div class="cta-glow"></div>
</div>

<footer>
✨ 透明定价 · 无隐藏费用 · 改到满意为止<br>
闲鱼搜索 <b>秋野春日</b> 或 <a href="https://m.tb.cn/h.R4Fav0N?tk=KhKo5w3corA" target="_blank">点此直通闲鱼</a><br>
实际报价以最终沟通为准
</footer>
</div>

<script>
// ── 鼠标互动粒子系统 ──
const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');
let w,h,particles=[],mouse={x:w/2,y:h/2,r:120};
function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

class Particle{
constructor(){this.reset()}
reset(){this.x=Math.random()*w;this.y=Math.random()*h;
this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.4;
this.r=Math.random()*2+1;this.opacity=Math.random()*.5+.3;}
update(){
let dx=mouse.x-this.x,dy=mouse.y-this.y,dist=Math.sqrt(dx*dx+dy*dy);
if(dist<mouse.r){let force=(mouse.r-dist)/mouse.r;
this.vx+=dx/dist*force*.15;this.vy+=dy/dist*force*.15;}
this.vx*=.99;this.vy*=.99;this.x+=this.vx;this.y+=this.vy;
if(this.x<0)this.x=w;if(this.x>w)this.x=0;if(this.y<0)this.y=h;if(this.y>h)this.y=0;
}
draw(){
ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
let dx=mouse.x-this.x,dy=mouse.y-this.y,dist=Math.sqrt(dx*dx+dy*dy);
let glow=dist<mouse.r?1:(1-Math.min(1,(dist-mouse.r)/100))*this.opacity;
ctx.fillStyle=`rgba(167,139,250,${glow})`;ctx.fill();
}
}
for(let i=0;i<100;i++)particles.push(new Particle());

function animate(){
ctx.clearRect(0,0,w,h);
particles.forEach(p=>{p.update();p.draw();});
// Draw connections
particles.forEach((a,i)=>{particles.slice(i+1).forEach(b=>{
let dx=a.x-b.x,dy=a.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
if(dist<100){
ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
ctx.strokeStyle=`rgba(167,139,250,${.06*(1-dist/100)})`;
ctx.lineWidth=.5;ctx.stroke();}
});});
requestAnimationFrame(animate);
}
animate();

// ── 鼠标追踪 ──
document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
document.addEventListener('touchmove',e=>{mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY;},{passive:true});

// ── 自定义光标 ──
const cursor=document.getElementById('cursor');
const follower=document.getElementById('cursorFollower');
document.addEventListener('mousemove',e=>{
cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';
setTimeout(()=>{follower.style.left=e.clientX+'px';follower.style.top=e.clientY+'px';},50);
});
// Enlarge on interactive elements
document.querySelectorAll('.option,.check-row,.cta,a').forEach(el=>{
el.addEventListener('mouseenter',()=>{cursor.style.transform='scale(2.5)';cursor.style.background='#a78bfa';follower.style.width='60px';follower.style.height='60px';follower.style.borderColor='rgba(167,139,250,.5)';});
el.addEventListener('mouseleave',()=>{cursor.style.transform='scale(1)';cursor.style.background='#fff';follower.style.width='40px';follower.style.height='40px';follower.style.borderColor='rgba(167,139,250,.3)';});
});

// ── 价格计算 + 平滑动画 ──
let currentDisplay=500;
function animatePrice(target){
let start=currentDisplay,duration=500,startTime=performance.now();
function step(now){
let elapsed=now-startTime,progress=Math.min(elapsed/duration,1);
let eased=1-Math.pow(1-progress,3);
let val=Math.round(start+(target-start)*eased);
document.getElementById('totalPrice').textContent='¥'+val.toLocaleString();
if(progress<1)requestAnimationFrame(step);else currentDisplay=target;
}
requestAnimationFrame(step);
}
function calc(){
let typeEl=document.querySelector('#typeOptions .option.selected');
let base=parseInt(typeEl.dataset.base);
let pageEl=document.querySelector('#pageOptions .option.selected');
let pageAdd=parseInt(pageEl.dataset.add);
let checks=document.querySelectorAll('#featureChecks input:checked');
let featAdd=0;checks.forEach(c=>featAdd+=parseInt(c.dataset.add));
let total=base+pageAdd+featAdd;
animatePrice(total);
document.getElementById('rangeText').textContent='实际 ¥'+Math.round(total*.85).toLocaleString()+' ~ ¥'+Math.round(total*1.15).toLocaleString();
}
document.querySelectorAll('.option').forEach(el=>{
el.addEventListener('click',function(){
this.parentElement.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
this.classList.add('selected');calc();});
});
document.querySelectorAll('#featureChecks input').forEach(el=>el.addEventListener('change',calc));
</script>
</body>
</html>
