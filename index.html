<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网页设计报价计算器 | 在线免费估价</title>
<style>
:root{--bg:#04040e;--card:rgba(12,12,30,0.5);--text:#e6e6f2;--muted:#79799c;--accent:#7c5ce7;--accent2:#b094f8;--radius:18px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",system-ui;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden}
.container{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:24px}
canvas#bg3d{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.7}
canvas#trails{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* Orbs */
.orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:.35;pointer-events:none;z-index:0}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,#7c5ce7 0%,transparent 70%);top:-150px;left:-100px;animation:orb1 10s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,#6366f1 0%,transparent 70%);bottom:-120px;right:-80px;animation:orb2 14s ease-in-out infinite}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,#a78bfa 0%,transparent 70%);top:40%;left:55%;animation:orb3 16s ease-in-out infinite}
@keyframes orb1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(80px,60px) scale(1.3)}}
@keyframes orb2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-60px,-40px) scale(1.25)}}
@keyframes orb3{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-50px,-60px) scale(1.3)}66%{transform:translate(40px,30px) scale(.9)}}

/* Header */
header{text-align:center;padding:64px 0 48px;position:relative}
header .badge{display:inline-block;padding:7px 20px;background:rgba(124,92,231,.1);border:1px solid rgba(124,92,231,.25);border-radius:24px;font-size:.75rem;color:var(--accent2);margin-bottom:24px;letter-spacing:3px;position:relative;z-index:1}
header h1{font-size:2.5rem;font-weight:950;letter-spacing:-2px;background:linear-gradient(135deg,#f0f0ff 0%,#c4b5fd 30%,#8b5cf6 60%,#6d28d9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;position:relative;z-index:1;line-height:1.25}
header p{color:var(--muted);font-size:.9rem;position:relative;z-index:1}

/* Cards */
.card{background:var(--card);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius);padding:30px;margin-bottom:16px;position:relative;overflow:hidden;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.23,1,.32,1),border-color .4s,box-shadow .4s}
.card:hover{transform:rotateX(2deg) rotateY(-1deg);border-color:rgba(124,92,231,.12);box-shadow:0 20px 50px rgba(0,0,0,.3),0 0 40px rgba(124,92,231,.04)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,92,231,.5),transparent)}
.card::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at var(--mx,50%) var(--my,50%),rgba(124,92,231,.06) 0%,transparent 60%);pointer-events:none;opacity:0;transition:opacity .3s}
.card:hover::after{opacity:1}
.card h2{font-size:1rem;margin-bottom:22px;display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:.3px}
.card h2 .icon{font-size:1.2rem}

/* Options */
.options{display:flex;flex-wrap:wrap;gap:9px}
.option{flex:1;min-width:100px;padding:18px 12px;background:rgba(255,255,255,.012);border:1px solid rgba(255,255,255,.04);border-radius:14px;cursor:pointer;text-align:center;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative}
.option:hover{border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.025);transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.2)}
.option.selected{background:rgba(124,92,231,.12);border-color:var(--accent);box-shadow:0 0 30px rgba(124,92,231,.25),0 0 0 5px rgba(124,92,231,.04),0 8px 25px rgba(0,0,0,.2);transform:translateY(-2px)}
.option .name{font-size:.9rem;font-weight:600;margin-bottom:5px}
.option .hint{font-size:.7rem;color:var(--muted)}

/* Checks */
.check-group{display:flex;flex-direction:column;gap:7px}
.check-row{display:flex;align-items:center;gap:14px;padding:15px 18px;background:rgba(255,255,255,.008);border:1px solid rgba(255,255,255,.025);border-radius:14px;cursor:pointer;transition:all .25s}
.check-row:hover{background:rgba(124,92,231,.035);border-color:rgba(124,92,231,.12)}
.check-row:has(input:checked){background:rgba(124,92,231,.06);border-color:rgba(124,92,231,.18)}
.check-row input[type=checkbox]{appearance:none;width:21px;height:21px;border:2px solid rgba(255,255,255,.1);border-radius:7px;cursor:pointer;position:relative;flex-shrink:0;transition:all .25s}
.check-row input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent);box-shadow:0 0 18px rgba(124,92,231,.5)}
.check-row input[type=checkbox]:checked::after{content:"✓";color:#fff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:800}
.check-label{font-size:.88rem;font-weight:500}
.check-price{font-size:.82rem;color:var(--accent2);margin-left:auto;font-weight:700;min-width:60px;text-align:right}

/* Result */
.result{text-align:center;padding:56px 0 48px;position:relative}
.result-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:240px;height:240px;border-radius:50%;border:1.5px solid rgba(124,92,231,.2);border-top-color:rgba(167,139,250,.35);animation:ringSpin 6s linear infinite;pointer-events:none}
.result-ring:nth-child(2){width:290px;height:290px;border-width:1px;border-top-color:rgba(167,139,250,.1);border-left-color:rgba(124,92,231,.08);border-right-color:transparent;animation-duration:10s;animation-direction:reverse}
@keyframes ringSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.result .label{font-size:.7rem;text-transform:uppercase;letter-spacing:5px;color:var(--muted);margin-bottom:14px;position:relative;z-index:1}
.result .total{font-size:4.5rem;font-weight:950;letter-spacing:-5px;line-height:1;position:relative;z-index:1;background:linear-gradient(180deg,#fff 0%,#c4b5fd 40%,#8b5cf6 70%,#6d28d9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 40px rgba(124,92,231,.35));transition:all .3s}
.result .range{font-size:1rem;color:var(--muted);margin-top:10px;position:relative;z-index:1;font-weight:500}
.result .includes{color:var(--muted);font-size:.78rem;margin-top:20px;padding:8px 24px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.03);border-radius:24px;display:inline-block;position:relative;z-index:1}

/* CTA */
.cta-wrap{position:relative;margin-top:6px}
.cta{display:block;width:100%;padding:21px;background:linear-gradient(135deg,#6d28d9 0%,#7c3aed 30%,#a78bfa 100%);color:#fff;border:none;border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;transition:all .35s;position:relative;overflow:hidden;letter-spacing:.5px;z-index:1}
.cta:hover{box-shadow:0 16px 50px rgba(124,92,231,.5);transform:translateY(-3px)}
.cta span{position:relative;z-index:1}
.cta-glow{position:absolute;inset:-4px;border-radius:20px;background:linear-gradient(135deg,#7c5ce7,#a78bfa,#6366f1,#7c5ce7);background-size:300% 300%;filter:blur(24px);opacity:.3;animation:glowShift 4s ease-in-out infinite;pointer-events:none;z-index:0}
@keyframes glowShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

footer{text-align:center;color:var(--muted);font-size:.74rem;padding:36px 0 64px;position:relative;z-index:1}
footer a{color:var(--accent2);text-decoration:none;font-weight:500}

@media(max-width:480px){
header h1{font-size:1.7rem}
.option{min-width:80px;padding:14px 8px}
.result .total{font-size:3rem}
.result-ring,.result-ring:nth-child(2){width:160px;height:160px}
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<canvas id="bg3d"></canvas>
<canvas id="trails"></canvas>

<div class="container">
<header>
<div class="badge">DESIGN PRICING TOOL</div>
<h1>网页设计报价计算器</h1>
<p>定制需求 · 实时报价 · 设计师 <b>秋野春日</b></p>
</header>

<div class="card" id="cardType">
<h2><span class="icon">📋</span> 网站类型</h2>
<div class="options" id="typeOptions">
<div class="option selected" data-type="landing" data-base="500"><div class="name">单页落地页</div><div class="hint">产品推广 / 个人介绍</div></div>
<div class="option" data-type="business" data-base="1500"><div class="name">企业官网</div><div class="hint">多页面 / 品牌展示</div></div>
<div class="option" data-type="ecommerce" data-base="2800"><div class="name">电商店铺</div><div class="hint">产品展示 / 购物流程</div></div>
</div>
</div>

<div class="card" id="cardPages">
<h2><span class="icon">📄</span> 页面数量</h2>
<div class="options" id="pageOptions">
<div class="option selected" data-pages="1" data-add="0"><div class="name">1页</div><div class="hint">单页滚动</div></div>
<div class="option" data-pages="3" data-add="300"><div class="name">3页</div><div class="hint">小站标配</div></div>
<div class="option" data-pages="5" data-add="600"><div class="name">5页</div><div class="hint">常见规格</div></div>
<div class="option" data-pages="10" data-add="1500"><div class="name">10页+</div><div class="hint">内容较多</div></div>
</div>
</div>

<div class="card" id="cardFeats">
<h2><span class="icon">⚡</span> 附加功能</h2>
<div class="check-group" id="featureChecks">
<label class="check-row"><input type="checkbox" data-add="300"><span class="check-label">📱 移动端适配</span><span class="check-price">+¥300</span></label>
<label class="check-row"><input type="checkbox" data-add="200"><span class="check-label">📧 联系表单</span><span class="check-price">+¥200</span></label>
<label class="check-row"><input type="checkbox" data-add="300"><span class="check-label">🔍 SEO 优化</span><span class="check-price">+¥300</span></label>
<label class="check-row"><input type="checkbox" data-add="800"><span class="check-label">🔗 后台管理系统</span><span class="check-price">+¥800</span></label>
<label class="check-row"><input type="checkbox" data-add="200"><span class="check-label">🚀 上线部署协助</span><span class="check-price">+¥200</span></label>
</div>
</div>

<div class="result">
<div class="result-ring"></div><div class="result-ring"></div>
<div class="label">预 估 报 价</div>
<div class="total" id="totalPrice">¥500</div>
<div class="range" id="rangeText">实际 ¥425 ~ ¥575</div>
<div class="includes">设计 + 开发 + 修改 · 透明定价</div>
</div>

<div class="cta-wrap">
<a class="cta" id="ctaBtn" href="https://m.tb.cn/h.R4Fav0N?tk=KhKo5w3corA" target="_blank"><span>去闲鱼联系「秋野春日」获取报价</span></a>
<div class="cta-glow"></div>
</div>

<footer>✨ 透明定价 · 无隐藏费用 · 改到满意为止<br>闲鱼搜索 <b>秋野春日</b> 或 <a href="https://m.tb.cn/h.R4Fav0N?tk=KhKo5w3corA" target="_blank">点此直通闲鱼</a></footer>
</div>

<script>
// ═══ 3D 旋转线框几何体（纯 Canvas 无库） ═══
const bg3d=document.getElementById('bg3d'),ctx3=bg3d.getContext('2d');
let w3,h3,mx=0,my=0,rotX=0,rotY=0;

function resize3d(){w3=bg3d.width=window.innerWidth;h3=bg3d.height=window.innerHeight}
resize3d();window.addEventListener('resize',resize3d);
document.addEventListener('mousemove',e=>{mx=(e.clientX/w3-.5)*2;my=(e.clientY/h3-.5)*2});

// 3D 二十面体顶点
const phi=(1+Math.sqrt(5))/2;
const icoVerts=[
[-1,phi,0],[1,phi,0],[-1,-phi,0],[1,-phi,0],
[0,-1,phi],[0,1,phi],[0,-1,-phi],[0,1,-phi],
[phi,0,-1],[phi,0,1],[-phi,0,-1],[-phi,0,1]
].map(v=>[v[0],v[1],v[2]]);
// 二十面体边（三角形面展开为边）
const icoFaces=[
[0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],
[1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
[3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],
[4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1]
];
const edges=new Set();
icoFaces.forEach(f=>{for(let i=0;i<3;i++){let a=f[i],b=f[(i+1)%3];edges.add(Math.min(a,b)+'_'+Math.max(a,b))}});
const edgeList=[...edges].map(e=>e.split('_').map(Number));

function rotate3d(v,rx,ry){
let[x,y,z]=v;
let cosX=Math.cos(rx),sinX=Math.sin(rx);
let y1=y*cosX-z*sinX,z1=y*sinX+z*cosX;
let cosY=Math.cos(ry),sinY=Math.sin(ry);
let x1=x*cosY+z1*sinY,z2=-x*sinY+z1*cosY;
return[x1,y1,z2];
}

const targetRx={v:0},targetRy={v:0};
function draw3d(){
ctx3.clearRect(0,0,w3,h3);
targetRx.v=mx*.8;targetRy.v=my*.8;
rotX+=(targetRx.v-rotX)*.02;rotY+=(targetRy.v-rotY)*.02;

let scale=Math.min(w3,h3)*.28;
let cx=w3/2,cy=h3/2+20;
let pts=icoVerts.map(v=>rotate3d(v,rotX,rotY));

edgeList.forEach(([a,b])=>{
let p1=pts[a],p2=pts[b];
let z=(p1[2]+p2[2])/2+2;
let alpha=.06+.04*(z/3);
ctx3.beginPath();ctx3.moveTo(cx+p1[0]*scale,cy+p1[1]*scale);
ctx3.lineTo(cx+p2[0]*scale,cy+p2[1]*scale);
ctx3.strokeStyle=`rgba(167,139,250,${alpha})`;ctx3.lineWidth=1;ctx3.stroke();
});
pts.forEach(([x,y,z])=>{
let r=(z+2)/3*2+1;
let alpha=.15+.1*(z/3);
ctx3.beginPath();ctx3.arc(cx+x*scale,cy+y*scale,r,0,Math.PI*2);
ctx3.fillStyle=`rgba(255,255,255,${alpha})`;ctx3.fill();
});
requestAnimationFrame(draw3d);
}
draw3d();

// ═══ 鼠标拖尾粒子 ═══
const trails=document.getElementById('trails'),ctxT=trails.getContext('2d');
let tw,th,trailParticles=[];
function resizeT(){tw=trails.width=window.innerWidth;th=trails.height=window.innerHeight}
resizeT();window.addEventListener('resize',resizeT);
document.addEventListener('mousemove',e=>{
for(let i=0;i<3;i++){
trailParticles.push({x:e.clientX+(Math.random()-.5)*16,y:e.clientY+(Math.random()-.5)*16,
vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5-1,life:1,decay:.015+Math.random()*.025,r:Math.random()*2+1});
}
if(trailParticles.length>200)trailParticles.splice(0,trailParticles.length-200);
});
function drawTrails(){
ctxT.clearRect(0,0,tw,th);
trailParticles=trailParticles.filter(p=>(p.life-=p.decay)>0);
trailParticles.forEach(p=>{
p.x+=p.vx;p.y+=p.vy;
ctxT.beginPath();ctxT.arc(p.x,p.y,p.r,0,Math.PI*2);
ctxT.fillStyle=`rgba(167,139,250,${p.life*.6})`;ctxT.fill();
});
requestAnimationFrame(drawTrails);
}
drawTrails();

// ═══ 卡片 3D 倾斜 ═══
document.querySelectorAll('.card').forEach(card=>{
card.addEventListener('mousemove',e=>{
let rect=card.getBoundingClientRect();
let x=(e.clientX-rect.left)/rect.width-.5;
let y=(e.clientY-rect.top)/rect.height-.5;
card.style.setProperty('--mx',(e.clientX-rect.left)/rect.width*100+'%');
card.style.setProperty('--my',(e.clientY-rect.top)/rect.height*100+'%');
card.style.transform=`rotateX(${-y*8}deg) rotateY(${x*8}deg)`;
});
card.addEventListener('mouseleave',()=>{card.style.transform='rotateX(0) rotateY(0)';});
});

// ═══ 价格计算 ═══
let cur=500;
function animPrice(t){
let s=cur,d=500,st=performance.now();
function step(now){
let p=Math.min((now-st)/d,1),e=1-Math.pow(1-p,3);
document.getElementById('totalPrice').textContent='¥'+Math.round(s+(t-s)*e).toLocaleString();
if(p<1)requestAnimationFrame(step);else cur=t;
}
requestAnimationFrame(step);
}
function calc(){
let b=parseInt(document.querySelector('#typeOptions .option.selected').dataset.base);
let pa=parseInt(document.querySelector('#pageOptions .option.selected').dataset.add);
let fa=0;document.querySelectorAll('#featureChecks input:checked').forEach(c=>fa+=parseInt(c.dataset.add));
let t=b+pa+fa;
animPrice(t);
document.getElementById('rangeText').textContent='实际 ¥'+Math.round(t*.85).toLocaleString()+' ~ ¥'+Math.round(t*1.15).toLocaleString();
}
document.querySelectorAll('.option').forEach(el=>el.addEventListener('click',function(){
this.parentElement.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
this.classList.add('selected');calc();
}));
document.querySelectorAll('#featureChecks input').forEach(el=>el.addEventListener('change',calc));
</script>
</body>
</html>
